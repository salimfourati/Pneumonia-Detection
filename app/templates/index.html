<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détection de Pneumonie</title>
    <!-- Bootstrap CSS local -->
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- CSS personnalisé -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        /* Overlay spinner pleine page */
        #loading-overlay {
            display: none;
            position: fixed;
            z-index: 1050;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            justify-content: center;
            align-items: center;
        }
        #loading-overlay .spinner-border {
            width: 4rem;
            height: 4rem;
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg" style="width: 100%; max-width: 600px;">
            <div class="card-header bg-primary text-white text-center py-4">
                <h1 class="card-title"><i class="fas fa-lungs"></i> Détection de Pneumonie</h1>
                <p class="mb-0">Téléchargez une image de radiographie pour détecter si elle est normale ou présente une pneumonie.</p>
            </div>
            <div class="card-body p-5">
                <form action="/predict" method="POST" enctype="multipart/form-data" class="text-center" id="predictForm">
                    <div class="mb-4">
                        <input type="file" class="form-control" name="file" accept=".png, .jpg, .jpeg" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg" id="analyze-button">
                        <span id="button-text">Prédire</span>
                        <span id="spinner" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="display: none;"></span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Overlay de chargement pleine page -->
    <div id="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Chargement...</span>
        </div>
    </div>

    <div class="text-center my-3">
        <img id="preview" src="#" alt="Aperçu de l'image" style="max-width: 100%; display: none; border: 1px solid #ccc; padding: 5px; border-radius: 8px;">
    </div>

    <!-- Bootstrap JS local -->
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    
    <script>
        // Affichage de l'aperçu de l'image
        document.querySelector('input[type="file"]').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        // Affichage spinner bouton + overlay au clic
        document.getElementById('predictForm').addEventListener('submit', function() {
            document.getElementById('spinner').style.display = 'inline-block';
            document.getElementById('button-text').style.display = 'none';
            document.getElementById('analyze-button').disabled = true;
            document.getElementById('loading-overlay').style.display = 'flex';
        });
    </script>
    
</body>
</html>
